name: Stale Branches Cleanup

on:
  workflow_call:

permissions:
  contents: write

jobs:
  cleanup:
    runs-on: self-hosted
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: 🧹 Очистка старых веток
        run: |
          STALE_DAYS=30
          DELETED=0
          for branch in $(git branch -r --format='%(refname:short)' | grep -v 'origin/main\|origin/HEAD'); do
            BRANCH_NAME=${branch#origin/}
            LAST_COMMIT=$(git log -1 --format='%ci' "$branch" 2>/dev/null || echo "")
            [ -z "$LAST_COMMIT" ] && continue
            DAYS_AGO=$(( ($(date +%s) - $(date -d "$LAST_COMMIT" +%s 2>/dev/null || echo "0")) / 86400 ))
            if [ $DAYS_AGO -gt $STALE_DAYS ]; then
              MERGED=$(git branch -r --merged origin/main | grep "$branch" || echo "")
              if [ -n "$MERGED" ]; then
                git push origin --delete "$BRANCH_NAME" 2>/dev/null && DELETED=$((DELETED + 1)) || true
              fi
            fi
          done
          echo "Удалено: $DELETED веток"
