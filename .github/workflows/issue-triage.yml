name: Issue Triage

on:
  workflow_call:

permissions:
  issues: write

jobs:
  triage:
    runs-on: self-hosted
    steps:
      - name: 🏷️ Авто-лейблы
        uses: actions/github-script@v7
        with:
          script: |
            const title = context.payload.issue.title.toLowerCase();
            const body = (context.payload.issue.body || '').toLowerCase();
            const text = title + ' ' + body;
            const labels = [];
            if (text.match(/bug|error|ошибк|баг|crash/)) labels.push('bug');
            if (text.match(/feat|feature|фич|добавить/)) labels.push('enhancement');
            if (text.match(/doc|документ/)) labels.push('documentation');
            if (text.match(/perf|медленн/)) labels.push('performance');
            if (text.match(/security|безопасн/)) labels.push('security');
            if (text.match(/ui|css|дизайн/)) labels.push('ui');
            if (text.match(/api|endpoint/)) labels.push('api');
            if (text.match(/critical|критическ|срочн/)) labels.push('priority:critical');
            if (labels.length === 0) labels.push('triage');
            for (const label of labels) {
              try { await github.rest.issues.getLabel({ owner: context.repo.owner, repo: context.repo.repo, name: label }); }
              catch { await github.rest.issues.createLabel({ owner: context.repo.owner, repo: context.repo.repo, name: label, color: 'ededed' }); }
            }
            await github.rest.issues.addLabels({ owner: context.repo.owner, repo: context.repo.repo, issue_number: context.issue.number, labels });
