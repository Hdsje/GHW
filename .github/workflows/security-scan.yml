name: Security Scan (OWASP ZAP)

on:
  workflow_call:
    inputs:
      target_url:
        description: 'URL для сканирования'
        required: false
        type: string
        default: 'http://localhost:3000'

permissions:
  contents: read
  issues: write

jobs:
  scan:
    runs-on: self-hosted
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: 🔐 ZAP Baseline Scan
        run: |
          TARGET="${{ inputs.target_url }}"
          echo "=== OWASP ZAP Scan: $TARGET ==="
          
          # Простой скан заголовков безопасности
          HEADERS=$(curl -sI "$TARGET" 2>/dev/null || echo "")
          
          ISSUES=""
          echo "$HEADERS" | grep -qi "x-frame-options" || ISSUES="${ISSUES}❌ X-Frame-Options отсутствует\n"
          echo "$HEADERS" | grep -qi "x-content-type-options" || ISSUES="${ISSUES}❌ X-Content-Type-Options отсутствует\n"
          echo "$HEADERS" | grep -qi "strict-transport-security" || ISSUES="${ISSUES}⚠️ HSTS отсутствует\n"
          echo "$HEADERS" | grep -qi "content-security-policy" || ISSUES="${ISSUES}⚠️ CSP отсутствует\n"
          
          if [ -n "$ISSUES" ]; then
            echo -e "Найдены проблемы:\n$ISSUES"
          else
            echo "✅ Все заголовки безопасности на месте"
          fi
